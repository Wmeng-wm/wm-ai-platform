<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王萌编织工艺平台 | Wang Meng Braiding Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-brand-icon">M</span>
            <span>医疗编织工艺知识库</span>
        </div>
        <div class="nav-links">
            <a class="nav-link active" data-page="home">首页</a>
            <a class="nav-link" data-page="work-record">工作记录</a>
            <a class="nav-link" data-page="service-report">售后报告</a>
            <a class="nav-link" data-page="param-db">参数数据库</a>
            <a class="nav-link" data-page="knowledge">工艺知识库</a>
        </div>
        <div class="nav-actions">
            <button class="btn-nav-settings" id="btn-backup" title="备份数据">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
            </button>
            <button class="btn-nav-settings" id="btn-ai-settings" title="AI 润色设置">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </div>
        <button class="nav-toggle" aria-label="菜单">&#9776;</button>
    </nav>

    <!-- 页面容器 -->
    <main>
        <section id="page-home" class="page active"></section>
        <section id="page-work-record" class="page"></section>
        <section id="page-service-report" class="page"></section>
        <section id="page-param-db" class="page"></section>
        <section id="page-knowledge" class="page"></section>
    </main>

    <!-- 脚本 -->
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/export.js"></script>
    <script src="js/utils/ai.js"></script>
    <script src="js/utils/backup.js"></script>
    <script src="js/utils/cloud.js"></script>
    <script src="js/modules/workRecord.js"></script>
    <script src="js/modules/serviceReport.js"></script>
    <script src="js/modules/paramDB.js"></script>
    <script src="js/modules/knowledgeBase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
